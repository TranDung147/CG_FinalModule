<!-- templates/layout.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý cửa hàng điện thoại</title>

  <link rel="stylesheet" th:href="@{/css/admin/fragments/sidebar.css}">
  <link rel="stylesheet" th:href="@{/css/admin/fragments/header.css}">
  <link rel="stylesheet" th:href="@{/css/admin/fragments/footer.css}">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .main-content {
      margin-left: 250px;
      margin-top: 100px;
      margin-bottom: 50px;
      padding: 20px;
      min-height: calc(100vh - 110px);
      transition: margin-left 0.3s ease;
    }
  </style>
</head>
<body>

<!-- Header -->
<div th:replace="~{admin/fragments/header :: header}"></div>

<!-- Sidebar -->
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

<!-- Main Content -->
<main class="main-content">
  <div class="col-md-9 container mt-4">
    <h1 class="mb-4">Quản lý nhân viên</h1>

    <!-- Form tìm kiếm -->
    <div class="mb-4">
      <form th:action="@{/Admin}" method="get">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Nhập từ khóa"/>
        <select name="type">
          <option value="all" th:selected="${type == 'all'}">Tất cả</option>
          <option value="employeeName" th:selected="${type == 'employeeName'}">Họ và Tên</option>
          <option value="employeePhone" th:selected="${type == 'employeePhone'}">Số điện thoại</option>
          <option value="employeeWork" th:selected="${type == 'employeeWork'}">Công việc</option>
        </select>
        <button type="submit">Tìm kiếm</button>
      </form>
    </div>

    <!-- Bảng nhân viên -->
    <table class="table table-striped table-bordered">
      <thead class="table-dark">
      <tr>
        <th>#</th>
        <th>Tên Nhân Viên</th>
        <th>Ngày Sinh</th>
        <th>Địa Chỉ</th>
        <th>SĐT</th>
        <th>Công việc</th>
        <th>Hành động </th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="employee, s : ${list}">
        <td th:text="${s.count}"></td>
        <td th:text="${employee.employeeName}"></td>
        <td th:text="${#dates.format(employee.getEmployeeBirthday(), 'dd/MM/yyyy')}"></td>
        <td th:text="${employee.employeeAddress}"></td>
        <td th:text="${employee.employeePhone}"></td>
        <td th:text="${employee.employeeWork}"></td>


        </td>
      </tr>

      </tbody>
    </table>

    <!-- Nút thêm nhân viên -->
    <div class="mt-4">
      <a href="/admin-home/employee-manager/create" class="btn btn-success">Thêm Nhân Viên</a>
    </div>

    <!-- Phân trang -->
    <div class="mt-3">
      <span>Trang: </span>
      <span th:text="${currentPage}"></span> / <span th:text="${totalPages}"></span>

      <a th:if="${currentPage > 1}" th:href="@{/Admin(keyword=${keyword}, type=${type}, page=${currentPage - 1})}">Trước</a>
      <a th:if="${currentPage < totalPages}" th:href="@{/Admin(keyword=${keyword}, type=${type}, page=${currentPage + 1})}">Tiếp</a>
    </div>
  </div>
</main>

<!-- Footer -->
<div th:replace="~{admin/fragments/footer :: footer}"></div>

<script th:src="@{/js/admin/layout.js}"></script>

</body>
</html>
